<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevMentor — Seu Assistente de Carreira Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f5f0e8;
  --surface:    #ede8df;
  --surface2:   #e4ddd3;
  --ink:        #1a1714;
  --ink2:       #4a4540;
  --ink3:       #8a8480;
  --accent:     #c8401a;
  --accent2:    #1a6bc8;
  --green:      #1a7a3c;
  --border:     rgba(26,23,20,0.12);
  --shadow:     rgba(26,23,20,0.08);
  --font-body:  'Fraunces', Georgia, serif;
  --font-mono:  'IBM Plex Mono', 'Courier New', monospace;
  --radius:     10px;
  --sidebar-w:  280px;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}

/* ── Layout ──────────────────────────────────────────────────── */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  gap: 24px;
  overflow-y: auto;
}

.brand {
  padding: 4px 8px;
}

.brand-name {
  font-family: var(--font-body);
  font-size: 1.4rem;
  font-weight: 700;
  font-style: italic;
  letter-spacing: -0.02em;
  color: var(--accent);
  line-height: 1;
}

.brand-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 3px;
}

.sidebar-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--ink3);
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 8px;
}

/* ── Persona cards ───────────────────────────────────────────── */
.persona-list { display: flex; flex-direction: column; gap: 6px; }

.persona-btn {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  width: 100%;
}

.persona-btn:hover {
  background: var(--surface2);
  border-color: var(--border);
}

.persona-btn.active {
  background: white;
  border-color: var(--accent);
  box-shadow: 0 2px 8px var(--shadow);
}

.persona-emoji { font-size: 18px; line-height: 1; margin-top: 1px; }

.persona-info { flex: 1; min-width: 0; }

.persona-name {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.persona-desc {
  font-size: 11px;
  color: var(--ink3);
  margin-top: 1px;
  line-height: 1.3;
}

/* ── Starter prompts ─────────────────────────────────────────── */
.starters { display: flex; flex-direction: column; gap: 4px; }

.starter-btn {
  display: block; width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink2);
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.3;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}

.starter-btn:hover {
  background: var(--surface2);
  border-color: rgba(26,23,20,0.2);
  color: var(--ink);
}

/* ── API status ──────────────────────────────────────────────── */
.api-status {
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface2);
}

.api-status-row {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink3);
}

.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink3); }
.dot.ok     { background: var(--green); box-shadow: 0 0 4px rgba(26,122,60,0.4); }
.dot.demo   { background: var(--accent); box-shadow: 0 0 4px rgba(200,64,26,0.4); }
.dot.error  { background: #c81a1a; }

/* ── Main area ───────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── Top bar ─────────────────────────────────────────────────── */
.topbar {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg);
  flex-shrink: 0;
}

.topbar-persona {
  display: flex; align-items: center; gap: 10px;
}

.topbar-emoji { font-size: 20px; }

.topbar-name {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 600;
  font-style: italic;
}

.topbar-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.topbar-actions { display: flex; gap: 8px; }

.btn-ghost {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink2);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-ghost:hover { background: var(--surface2); color: var(--ink); }

/* ── Messages ────────────────────────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Welcome screen ──────────────────────────────────────────── */
.welcome {
  max-width: 560px;
  margin: 40px auto;
  text-align: center;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { transform: translateY(16px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.welcome-emoji { font-size: 48px; margin-bottom: 16px; }

.welcome h1 {
  font-family: var(--font-body);
  font-size: 2rem;
  font-weight: 300;
  font-style: italic;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 8px;
}

.welcome h1 strong {
  font-weight: 700;
  color: var(--accent);
}

.welcome p {
  font-size: 14px;
  color: var(--ink3);
  line-height: 1.6;
  max-width: 420px;
  margin: 0 auto;
}

/* ── Message bubble ──────────────────────────────────────────── */
.msg {
  display: flex;
  gap: 14px;
  max-width: 780px;
  animation: msgIn 0.25s ease both;
}

@keyframes msgIn {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0);   opacity: 1; }
}

.msg.user { margin-left: auto; flex-direction: row-reverse; }

.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg.user .msg-avatar {
  background: var(--accent);
  color: white;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
}

.msg.assistant .msg-avatar {
  background: var(--ink);
  color: white;
}

.msg-body { flex: 1; min-width: 0; }

.msg.user .msg-body {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.65;
  max-width: 100%;
}

.msg.user .msg-bubble {
  background: var(--ink);
  color: #f5f0e8;
  border-bottom-right-radius: 3px;
}

.msg.assistant .msg-bubble {
  background: white;
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
  box-shadow: 0 2px 8px var(--shadow);
}

/* ── Markdown inside bubbles ─────────────────────────────────── */
.msg-bubble p { margin-bottom: 0.7em; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
  font-family: var(--font-body); font-style: italic;
  margin: 1em 0 0.4em; color: var(--ink);
}
.msg-bubble h3 { font-size: 1rem; }
.msg-bubble ul, .msg-bubble ol { padding-left: 1.4em; margin-bottom: 0.7em; }
.msg-bubble li { margin-bottom: 0.3em; }
.msg-bubble code:not(pre code) {
  font-family: var(--font-mono);
  font-size: 0.85em;
  background: var(--surface2);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--accent);
}
.msg-bubble pre {
  border-radius: 8px;
  margin: 0.8em 0;
  overflow-x: auto;
  font-size: 12px;
}
.msg-bubble pre code { background: transparent; color: inherit; padding: 0; }
.msg-bubble strong { font-weight: 600; }
.msg-bubble blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px; margin: 0.7em 0;
  color: var(--ink2); font-style: italic;
}
.msg-bubble hr {
  border: none; border-top: 1px solid var(--border); margin: 1em 0;
}

.msg-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink3);
  margin-top: 4px;
  padding: 0 4px;
}

/* ── Typing indicator ────────────────────────────────────────── */
.typing-dots {
  display: flex; gap: 4px; padding: 4px 0;
}
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink3);
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30%            { transform: translateY(-5px); }
}

/* ── Input area ──────────────────────────────────────────────── */
.input-area {
  padding: 16px 28px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.input-box {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 10px 10px 16px;
  box-shadow: 0 2px 12px var(--shadow);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input-box:focus-within {
  border-color: rgba(26,23,20,0.3);
  box-shadow: 0 4px 16px var(--shadow);
}

#user-input {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink);
  background: transparent;
  min-height: 24px;
  max-height: 160px;
  overflow-y: auto;
}

#user-input::placeholder { color: var(--ink3); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: none;
  background: var(--ink);
  color: var(--bg);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
  transition: all 0.15s;
}

.send-btn:hover:not(:disabled) { background: var(--accent); transform: scale(1.05); }
.send-btn:disabled { background: var(--ink3); cursor: not-allowed; transform: none; }

.input-hint {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink3);
  margin-top: 8px;
  text-align: center;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">DevMentor</div>
      <div class="brand-sub">Career Assistant · v1.0</div>
    </div>

    <div>
      <div class="sidebar-section-title">Modo</div>
      <div class="persona-list" id="persona-list"></div>
    </div>

    <div>
      <div class="sidebar-section-title">Sugestões</div>
      <div class="starters" id="starters"></div>
    </div>

    <div style="margin-top:auto">
      <div class="sidebar-section-title">Status</div>
      <div class="api-status">
        <div class="api-status-row">
          <div class="dot" id="status-dot"></div>
          <span id="status-label">verificando...</span>
        </div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink3);margin-top:4px" id="status-model"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-persona">
        <div class="topbar-emoji" id="topbar-emoji">🧑‍💻</div>
        <div>
          <div class="topbar-name" id="topbar-name">DevMentor</div>
          <div class="topbar-label" id="topbar-label">Mentor de Carreira</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost" onclick="clearChat()">Limpar conversa</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji" id="welcome-emoji">🧑‍💻</div>
        <h1>Olá! Sou o <strong>DevMentor</strong></h1>
        <p>Seu assistente de carreira para desenvolvedores. Escolha um modo ao lado e comece a conversar.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea
          id="user-input"
          placeholder="Pergunte algo sobre sua carreira dev..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar (Enter)">
          ↑
        </button>
      </div>
      <div class="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
    </div>
  </main>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────
const API = 'http://localhost:8000';
const SESSION_ID = crypto.randomUUID();

// ── State ─────────────────────────────────────────────────────────────
let currentPersona = 'mentor';
let isStreaming = false;

// ── Personas ──────────────────────────────────────────────────────────
const PERSONAS = {
  mentor:      { emoji:'🧑‍💻', name:'DevMentor',       label:'Mentor de Carreira',     color:'#c8401a' },
  reviewer:    { emoji:'🔍', name:'CodeReviewer',     label:'Revisor de Código',       color:'#1a6bc8' },
  interviewer: { emoji:'🎯', name:'TechInterviewer',  label:'Simulador de Entrevista', color:'#1a7a3c' },
  resume:      { emoji:'📄', name:'ResumeCoach',      label:'Coach de Currículo',      color:'#7a1a6b' },
};

const STARTERS = {
  mentor:      ['Como criar um plano de carreira para sênior?', 'Quais skills são mais valorizadas em 2025?', 'Como negociar um aumento de salário?', 'Devo ir para backend, frontend ou full stack?'],
  reviewer:    ['Cole seu código aqui para eu revisar', 'Revise essa função Python para mim', 'O que você acha desse componente React?', 'Como melhorar a performance desse código?'],
  interviewer: ['Simule uma entrevista para vaga de pleno', 'Me faça perguntas de algoritmos para Google', 'Quero praticar entrevista comportamental', 'Perguntas de system design para sênior'],
  resume:      ['Revise meu resumo profissional', 'Como descrever meus projetos no currículo?', 'Cole sua experiência para eu reescrever', 'Como otimizar meu LinkedIn para recrutadores?'],
};

// ── Init ──────────────────────────────────────────────────────────────
function init() {
  renderPersonas();
  renderStarters();
  checkHealth();
  setupTextarea();
}

function renderPersonas() {
  const list = document.getElementById('persona-list');
  list.innerHTML = Object.entries(PERSONAS).map(([key, p]) => `
    <button class="persona-btn ${key === currentPersona ? 'active' : ''}"
            onclick="setPersona('${key}')">
      <span class="persona-emoji">${p.emoji}</span>
      <div class="persona-info">
        <div class="persona-name">${p.name}</div>
        <div class="persona-desc">${p.label}</div>
      </div>
    </button>
  `).join('');
}

function renderStarters() {
  const list = document.getElementById('starters');
  const starters = STARTERS[currentPersona] || [];
  list.innerHTML = starters.map(s => `
    <button class="starter-btn" onclick="useStarter(this.textContent)">${s}</button>
  `).join('');
}

function setPersona(key) {
  currentPersona = key;
  const p = PERSONAS[key];
  renderPersonas();
  renderStarters();
  document.getElementById('topbar-emoji').textContent = p.emoji;
  document.getElementById('topbar-name').textContent = p.name;
  document.getElementById('topbar-label').textContent = p.label;
  document.getElementById('welcome-emoji').textContent = p.emoji;
  document.querySelector('.welcome h1').innerHTML =
    `Olá! Sou o <strong>${p.name}</strong>`;
}

function useStarter(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

async function checkHealth() {
  try {
    const res = await fetch(API + '/health');
    const data = await res.json();
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    const model = document.getElementById('status-model');

    if (data.has_key) {
      dot.className = 'dot ok';
      label.textContent = data.provider + ' conectado';
      model.textContent = data.provider === 'groq' ? 'llama-3.3-70b' : 'gpt-4o-mini';
    } else {
      dot.className = 'dot demo';
      label.textContent = 'modo demo';
      model.textContent = 'configure GROQ_API_KEY';
    }
  } catch {
    document.getElementById('status-dot').className = 'dot error';
    document.getElementById('status-label').textContent = 'servidor offline';
  }
}

// ── Chat ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  hideWelcome();

  appendUserMsg(text);
  const assistantEl = appendAssistantMsg('', true);
  setSending(true);

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: SESSION_ID,
        persona: currentPersona,
        stream: true,
      }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.content) {
            fullText += data.content;
            renderAssistant(assistantEl, fullText, false);
          }
          if (data.done) {
            renderAssistant(assistantEl, fullText, true);
          }
        } catch {}
      }
    }

  } catch (e) {
    renderAssistant(assistantEl,
      `**Erro de conexão** — verifique se o servidor está rodando:\n\`\`\`\npython main.py\n\`\`\`\nDetalhe: ${e.message}`, true);
  } finally {
    setSending(false);
    scrollBottom();
  }
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.style.display = 'none';
}

function appendUserMsg(text) {
  const msgs = document.getElementById('messages');
  const p = PERSONAS[currentPersona];
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `
    <div class="msg-avatar">EU</div>
    <div class="msg-body">
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>
  `;
  msgs.appendChild(el);
  scrollBottom();
}

function appendAssistantMsg(text, typing = false) {
  const msgs = document.getElementById('messages');
  const p = PERSONAS[currentPersona];
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `
    <div class="msg-avatar">${p.emoji}</div>
    <div class="msg-body">
      <div class="msg-bubble">
        ${typing ? '<div class="typing-dots"><span></span><span></span><span></span></div>' : ''}
      </div>
      <div class="msg-time">${now()}</div>
    </div>
  `;
  msgs.appendChild(el);
  scrollBottom();
  return el;
}

function renderAssistant(el, text, done) {
  const bubble = el.querySelector('.msg-bubble');
  const parsed = marked.parse(text + (!done ? '▌' : ''));
  bubble.innerHTML = parsed;
  bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
  if (done) {
    const time = el.querySelector('.msg-time');
    if (time) time.textContent = now();
  }
  scrollBottom();
}

function clearChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-emoji" id="welcome-emoji">${PERSONAS[currentPersona].emoji}</div>
      <h1>Olá! Sou o <strong>${PERSONAS[currentPersona].name}</strong></h1>
      <p>Seu assistente de carreira para desenvolvedores. Escolha um modo ao lado e comece a conversar.</p>
    </div>
  `;
  fetch(API + '/session/' + SESSION_ID, { method: 'DELETE' }).catch(() => {});
}

// ── Utils ─────────────────────────────────────────────────────────────
function setSending(v) {
  isStreaming = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('user-input').disabled = v;
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function now() {
  return new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\n/g,'<br>');
}

// ── Textarea auto-resize ──────────────────────────────────────────────
function setupTextarea() {
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

init();
</script>
</body>
